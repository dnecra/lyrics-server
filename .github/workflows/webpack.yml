name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24.13.0
        cache: npm

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.201

    - name: Ensure 7-Zip is available
      shell: powershell
      run: |
        if (Get-Command 7z -ErrorAction SilentlyContinue) {
          Write-Host "7-Zip already available"
          exit 0
        }
        choco install 7zip -y
        7z

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Show build sizes
      shell: powershell
      run: |
        Get-ChildItem dist | Select-Object Name, Length | Format-Table -AutoSize

    - name: Upload exe artifact
      uses: actions/upload-artifact@v4
      with:
        name: lyrics-smtc-x64-exe
        path: dist/lyrics-smtc-x64.exe

    - name: Upload 7z artifact
      uses: actions/upload-artifact@v4
      with:
        name: lyrics-smtc-x64-7z
        path: dist/lyrics-smtc-x64.7z
